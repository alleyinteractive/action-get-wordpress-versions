name: 'Get WordPress Versions'
description: 'Fetch the last N number of WordPress versions and set as output'
author: 'Alley Interactive'

inputs:
  number:
    description: 'Number of WordPress versions to fetch'
    required: false
    default: '3'
  minimum-version:
    description: 'Minimum WordPress version to fetch (e.g., "6.0"). If set, returns all versions from this version onwards.'
    required: false
    default: ''

outputs:
  versions:
    description: 'Array of WordPress versions in JSON format'
    value: ${{ steps.get-versions.outputs.versions }}

runs:
  using: 'composite'
  steps:
    - name: Get WordPress Versions
      id: get-versions
      uses: actions/github-script@v7
      with:
        script: |
          const getWordPressVersions = require('${{github.action_path}}/get-versions.js');
          const inputNumber = '${{ inputs.number }}';
          const parsedNumber = parseInt(inputNumber);
          const numberOfVersions = inputNumber === '' || isNaN(parsedNumber) ? 3 : parsedNumber;
          const minimumVersion = '${{ inputs.minimum-version }}';
          await getWordPressVersions(core, numberOfVersions, minimumVersion);